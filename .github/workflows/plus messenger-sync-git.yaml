name: Plus APK Download and Sync

on:
  schedule:
    - cron: '0 */12 * * *'   # 每12小时运行一次
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    # ---- 锁机制 ----
    - name: Acquire Repository Lock 🔒
      id: lock
      run: |
        LOCK_DIR="$GITHUB_WORKSPACE/.lock"
        mkdir -p "$LOCK_DIR"
        LOCK_FILE="$LOCK_DIR/repo-lock"
        for i in {1..10}; do
          if [ -f "$LOCK_FILE" ]; then
            echo "锁已被占用，等待重试 ($i/10)..."
            sleep 30
          else
            touch "$LOCK_FILE"
            echo "lock-acquired=true" >> $GITHUB_OUTPUT
            echo "成功获取锁"
            exit 0
          fi
        done
        echo "错误: 无法在5分钟内获取锁"
        exit 1

    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 1

    - name: Configure Git
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@users.noreply.github.com"
        git config pull.rebase true

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl wget python3-pip
        pip install --upgrade pip
        pip install cloudscraper requests beautifulsoup4

    - name: Download and process APK
      env:
        APK_NAME: "plus_mod.apk"
        DOWNLOAD_URL: "https://leeapk.com/plus-messenger-mod-apk/download/"
      run: |
        # 拉取最新代码
        echo "拉取远程最新更改..."
        git pull origin main

        # 临时工作目录
        WORK_DIR=$(mktemp -d)
        echo "创建临时目录: $WORK_DIR"
        trap 'rm -rf "$WORK_DIR"; echo "清理临时目录..."' EXIT

        # ---- 核心 Python 脚本 ----
        cat > "$WORK_DIR/fetch_and_download.py" <<'EOF'
        import cloudscraper
        import sys
        import re
        from urllib.parse import urljoin
        from bs4 import BeautifulSoup

        def extract_apk_link(html, base_url):
            soup = BeautifulSoup(html, 'html.parser')
            
            # 策略1: 查找所有 <a> 标签，href 包含 .apk
            for a in soup.find_all('a', href=True):
                href = a['href']
                if '.apk' in href.lower():
                    return urljoin(base_url, href)
            
            # 策略2: 查找所有包含 "download" 文本的链接（不区分大小写）
            for a in soup.find_all('a', href=True, string=re.compile(r'download', re.I)):
                href = a['href']
                # 如果 href 没有 .apk，尝试拼接并检查是否指向 .apk
                if '.apk' in href.lower():
                    return urljoin(base_url, href)
                # 有些链接可能指向 /download/xxx，再请求可能得到重定向，但这里我们尝试点击
                # 简单起见，直接返回该 href，后续 cloudscraper 会跟随重定向
                if 'download' in href.lower():
                    return urljoin(base_url, href)
            
            # 策略3: 查找任意按钮或图片链接，可能 onClick 包含下载
            # 这里不处理太复杂的 JS，可以尝试查找 data-url 等属性
            for elem in soup.find_all(attrs={'data-url': True}):
                url = elem['data-url']
                if '.apk' in url.lower():
                    return urljoin(base_url, url)
            
            # 策略4: 直接在页面文本中搜索 .apk 链接
            match = re.search(r'https?://[^\s"\']+\.apk', html)
            if match:
                return match.group(0)
            
            return None

        if __name__ == "__main__":
            if len(sys.argv) < 2:
                print("用法: python script.py <下载页面URL>", file=sys.stderr)
                sys.exit(1)
            
            url = sys.argv[1]
            scraper = cloudscraper.create_scraper()
            
            # 获取页面
            try:
                resp = scraper.get(url, timeout=30)
                if resp.status_code != 200:
                    print(f"获取页面失败，状态码: {resp.status_code}", file=sys.stderr)
                    sys.exit(1)
            except Exception as e:
                print(f"请求异常: {e}", file=sys.stderr)
                sys.exit(1)
            
            html = resp.text
            apk_link = extract_apk_link(html, url)
            
            if not apk_link:
                print("错误: 未找到任何 APK 下载链接", file=sys.stderr)
                # 调试：打印页面前 500 字符
                print("页面片段:", html[:500], file=sys.stderr)
                sys.exit(1)
            
            print(apk_link)
        EOF

        # 执行提取脚本
        APK_LINK=$(python3 "$WORK_DIR/fetch_and_download.py" "$DOWNLOAD_URL")
        if [ $? -ne 0 ] || [ -z "$APK_LINK" ]; then
          echo "提取 APK 链接失败"
          exit 1
        fi
        echo "提取到 APK 链接: $APK_LINK"

        # ---- 版本号提取 ----
        FILENAME=$(basename "$APK_LINK")
        VERSION=$(echo "$FILENAME" | sed -n 's/.*Plus_Messenger_v\{0,1\}\([0-9]\+\.[0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')
        if [ -z "$VERSION" ]; then
          # 尝试从文件名中提取其他格式
          VERSION=$(echo "$FILENAME" | sed -n 's/.*\([0-9]\+\.[0-9]\+\.[0-9]\+\).*/\1/p')
        fi
        if [ -z "$VERSION" ]; then
          VERSION=$(date +%Y%m%d%H%M)
          echo "警告: 使用时间戳作为版本号: $VERSION"
        fi
        echo "版本号: $VERSION"

        CURRENT_DATE=$(TZ=Asia/Shanghai date +"%Y-%m-%d")
        echo "当前日期: $CURRENT_DATE"

        # ---- 版本文件处理 ----
        VERSION_FILE="version.txt"
        if [ -f "$VERSION_FILE" ]; then
          CURRENT_VERSION_JSON=$(cat "$VERSION_FILE")
        else
          CURRENT_VERSION_JSON="{}"
        fi

        CURRENT_VALUE=$(echo "$CURRENT_VERSION_JSON" | jq -r ".\"$APK_NAME\"")
        CURRENT_VERSION=""
        if [ "$CURRENT_VALUE" != "null" ] && [ -n "$CURRENT_VALUE" ]; then
          IFS=',' read -ra parts <<< "$CURRENT_VALUE"
          CURRENT_VERSION="${parts[0]}"
        fi
        CURRENT_VERSION_NO_V=${CURRENT_VERSION#v}

        echo "当前版本: $CURRENT_VERSION_NO_V"
        echo "新版本: $VERSION"

        # ---- 是否需要更新 ----
        NEED_UPDATE=false
        if [ "$CURRENT_VALUE" == "null" ] || [ -z "$CURRENT_VALUE" ]; then
          echo "需要更新: 版本记录不存在"
          NEED_UPDATE=true
        elif [ "$VERSION" != "$CURRENT_VERSION_NO_V" ]; then
          echo "需要更新: 发现新版本 ($CURRENT_VERSION_NO_V → $VERSION)"
          NEED_UPDATE=true
        elif [ ! -f "apk/$APK_NAME" ]; then
          echo "需要更新: APK文件不存在"
          NEED_UPDATE=true
        else
          echo "无需更新: 版本相同且文件存在"
        fi

        if [ "$NEED_UPDATE" = false ]; then
          echo "无需更新，退出"
          exit 0
        fi

        # ---- 下载 APK ----
        echo "正在下载 APK 文件..."
        cat > "$WORK_DIR/download.py" <<'EOF'
        import cloudscraper
        import sys
        import os

        if len(sys.argv) != 3:
            print("用法: python download.py <URL> <输出路径>", file=sys.stderr)
            sys.exit(1)

        url = sys.argv[1]
        outpath = sys.argv[2]

        scraper = cloudscraper.create_scraper()
        try:
            response = scraper.get(url, stream=True, timeout=120)
            if response.status_code != 200:
                print(f"下载失败，状态码: {response.status_code}", file=sys.stderr)
                sys.exit(1)
            total_size = 0
            with open(outpath, 'wb') as f:
                for chunk in response.iter_content(chunk_size=8192):
                    if chunk:
                        f.write(chunk)
                        total_size += len(chunk)
            print(f"下载完成，大小: {total_size} 字节")
        except Exception as e:
            print(f"下载异常: {e}", file=sys.stderr)
            sys.exit(1)
        EOF

        python3 "$WORK_DIR/download.py" "$APK_LINK" "$WORK_DIR/temp.apk"
        if [ $? -ne 0 ]; then
          echo "下载 APK 失败"
          exit 1
        fi

        # 校验文件大小
        if [ ! -f "$WORK_DIR/temp.apk" ]; then
          echo "错误: APK 文件不存在"
          exit 1
        fi
        FILE_SIZE=$(wc -c < "$WORK_DIR/temp.apk")
        if [ "$FILE_SIZE" -lt 50000000 ]; then
          echo "错误: 下载的文件大小($FILE_SIZE 字节)过小，可能无效"
          exit 1
        fi

        mkdir -p apk
        cp "$WORK_DIR/temp.apk" "apk/$APK_NAME"
        echo "已保存 APK 文件 (大小: $FILE_SIZE 字节)"

        # ---- 更新版本文件 ----
        NEW_VALUE="v$VERSION,$CURRENT_DATE"
        NEW_VERSION_JSON=$(echo "$CURRENT_VERSION_JSON" | jq --arg key "$APK_NAME" --arg value "$NEW_VALUE" '.[$key] = $value')
        echo "$NEW_VERSION_JSON" > "$VERSION_FILE"
        echo "更新版本文件"

        # ---- Git 提交与推送 ----
        git add apk/ "$VERSION_FILE"
        if [ -z "$(git status --porcelain)" ]; then
          echo "没有需要提交的变更"
          exit 0
        fi

        git commit -m "更新Plus Messenger: v$VERSION ($CURRENT_DATE)"
        echo "推送更改到远程仓库..."
        git push origin main

        echo "同步完成! 版本: v$VERSION, 日期: $CURRENT_DATE"

    - name: Release Repository Lock 🔓
      if: always()
      run: |
        LOCK_FILE="$GITHUB_WORKSPACE/.lock/repo-lock"
        if [ -f "$LOCK_FILE" ]; then
          rm -f "$LOCK_FILE"
          echo "锁已释放"
        else
          echo "锁文件不存在，无需释放"
        fi

  cleanup_self:
    name: Cleanup Self Workflow History
    runs-on: ubuntu-latest
    needs: sync
    if: ${{ always() }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 0
          retain_days: 0
          delete_workflow_pattern: "Plus APK Download and Sync"
          repository: ${{ github.repository }}