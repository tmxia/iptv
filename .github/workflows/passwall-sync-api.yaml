name: Passwall Packages Sync from Source Repository

on:
  schedule:
    - cron: '0 */12 * * *'  # 每12小时运行一次
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout current repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y jq curl zip

    - name: Run package sync script
      env:
        SOURCE_REPO: "Openwrt-Passwall/openwrt-passwall"
        TARGET_REPO: "${{ github.repository }}"
        TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # 新版 OpenWrt 23.05-24.10 的 IPK 包
        IPK_ZIP_TARGET: "23.05-24.10_luci-passwall.zip"
        IPK_ZIP_PATH: "apk/23.05-24.10_luci-passwall.zip"
        # 新版 OpenWrt 25.12+ 的 APK 包
        APK_ZIP_TARGET: "25.12_luci-passwall.zip"
        APK_ZIP_PATH: "apk/25.12_luci-passwall.zip"
      run: |
        # 创建临时工作目录
        WORK_DIR=$(mktemp -d)
        echo "创建临时目录: $WORK_DIR"
        mkdir -p "$WORK_DIR/ipk" "$WORK_DIR/apk"
        trap 'rm -rf "$WORK_DIR"; echo "清理临时目录..."' EXIT

        # 验证令牌访问权限
        echo "验证GitHub令牌权限..."
        RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" \
                  "https://api.github.com/repos/$TARGET_REPO")
        if [ "$RESPONSE" != "200" ]; then
          echo "错误: 令牌无效 (HTTP $RESPONSE)"
          exit 1
        fi

        # 获取最新稳定版发布信息（使用Token认证）
        echo "获取最新稳定版发布信息..."
        RELEASE_URL="https://api.github.com/repos/$SOURCE_REPO/releases/latest"
        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $TOKEN" "$RELEASE_URL")
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "错误: 获取发布信息失败, HTTP状态码: $HTTP_STATUS"
          exit 1
        fi
        RELEASE_JSON=$(curl -sL -H "Authorization: token $TOKEN" "$RELEASE_URL")

        # 提取版本信息
        TAG_NAME=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
        PUBLISHED_AT=$(echo "$RELEASE_JSON" | jq -r '.published_at')
        RELEASE_DATE=$(TZ=UTC date -d "$PUBLISHED_AT" +'%Y-%m-%d')
        echo "最新稳定版: $TAG_NAME (发布于: $RELEASE_DATE)"

        # 获取目标仓库当前版本文件
        echo "获取目标仓库当前版本文件..."
        TARGET_VERSION_JSON=$(curl -s -H "Authorization: token $TOKEN" \
            "https://api.github.com/repos/$TARGET_REPO/contents/version.txt")
        
        # 解析当前版本数据
        if [ "$(echo "$TARGET_VERSION_JSON" | jq -r '.message')" != "Not Found" ]; then
          VERSION_CONTENT=$(echo "$TARGET_VERSION_JSON" | jq -r '.content' | base64 -d)
          echo "当前版本文件内容:"
          echo "$VERSION_CONTENT"
          CURRENT_VERSION_DATA=$(echo "$VERSION_CONTENT" | jq . || echo "{}")
        else
          CURRENT_VERSION_DATA="{}"
          echo "目标仓库无版本文件"
        fi

        # 初始化更新标志
        IPK_NEED_UPDATE=false
        APK_NEED_UPDATE=false

        # 函数：检查是否需要更新
        check_update() {
          local target_path="$1"
          local key_name="$2"
          local current_version_data="$3"
          local source_version="$4"
          
          # 1. 检查目标文件是否存在
          echo "检查目标文件是否存在: $target_path..."
          FILE_EXIST_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: token $TOKEN" \
              "https://api.github.com/repos/$TARGET_REPO/contents/$target_path")
          
          if [ "$FILE_EXIST_RESPONSE" != "200" ]; then
            echo "目标文件不存在 (HTTP $FILE_EXIST_RESPONSE)，需要更新"
            return 0
          fi
          
          # 2. 检查版本文件中是否有对应键值
          local key_value=$(echo "$current_version_data" | jq -r ".\"$key_name\"")
          if [ "$key_value" = "null" ] || [ -z "$key_value" ]; then
            echo "版本文件中无对应键值，需要更新"
            return 0
          fi
          
          # 3. 检查版本是否匹配
          local current_version=$(echo "$key_value" | cut -d, -f1)
          if [ "$current_version" != "$source_version" ]; then
            echo "版本不匹配 (源版本: $source_version, 目标版本: $current_version)，需要更新"
            return 0
          fi
          
          echo "目标文件存在且版本匹配，无需更新"
          return 1
        }

        # 处理 23.05-24.10 版本 (IPK)
        echo "===== 处理 23.05-24.10 版本 (IPK) ====="
        if check_update "$IPK_ZIP_PATH" "$IPK_ZIP_TARGET" "$CURRENT_VERSION_DATA" "$TAG_NAME"; then
          IPK_NEED_UPDATE=true
          
          # 获取 IPK 文件 URL
          IPK_APP_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("23.05-24.10_luci-app-passwall")) | .browser_download_url' | head -1)
          IPK_I18N_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("23.05-24.10_luci-i18n-passwall-zh-cn")) | .browser_download_url' | head -1)
          
          if [ -z "$IPK_APP_URL" ] || [ -z "$IPK_I18N_URL" ]; then
            echo "错误: 未找到 23.05-24.10 版本文件"
            IPK_NEED_UPDATE=false
          else
            echo "下载 23.05-24.10 应用文件: $IPK_APP_URL"
            curl -sL "$IPK_APP_URL" -o "$WORK_DIR/ipk/23.05-24.10_luci-app-passwall.ipk"
            
            echo "下载 23.05-24.10 语言文件: $IPK_I18N_URL"
            curl -sL "$IPK_I18N_URL" -o "$WORK_DIR/ipk/23.05-24.10_luci-i18n-passwall-zh-cn.ipk"
            
            # 创建ZIP包
            cd "$WORK_DIR/ipk"
            zip -j "$WORK_DIR/$IPK_ZIP_TARGET" ./*
            cd -
            
            echo "23.05-24.10 版本文件打包完成"
          fi
        fi

        # 处理 25.12+ 版本 (APK)
        echo "===== 处理 25.12+ 版本 (APK) ====="
        if check_update "$APK_ZIP_PATH" "$APK_ZIP_TARGET" "$CURRENT_VERSION_DATA" "$TAG_NAME"; then
          APK_NEED_UPDATE=true
          
          # 获取 APK 文件 URL
          APK_APP_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("25.12+_luci-app-passwall")) | .browser_download_url' | head -1)
          APK_I18N_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("25.12+_luci-i18n-passwall-zh-cn")) | .browser_download_url' | head -1)
          
          if [ -z "$APK_APP_URL" ] || [ -z "$APK_I18N_URL" ]; then
            echo "错误: 未找到 25.12+ 版本文件"
            APK_NEED_UPDATE=false
          else
            echo "下载 25.12+ 应用文件: $APK_APP_URL"
            curl -sL "$APK_APP_URL" -o "$WORK_DIR/apk/25.12+_luci-app-passwall.apk"
            
            echo "下载 25.12+ 语言文件: $APK_I18N_URL"
            curl -sL "$APK_I18N_URL" -o "$WORK_DIR/apk/25.12+_luci-i18n-passwall-zh-cn.apk"
            
            # 创建ZIP包
            cd "$WORK_DIR/apk"
            zip -j "$WORK_DIR/$APK_ZIP_TARGET" ./*
            cd -
            
            echo "25.12+ 版本文件打包完成"
          fi
        fi

        # 更新版本数据
        echo "更新版本数据..."
        echo "$CURRENT_VERSION_DATA" > "$WORK_DIR/current_version.json"
        
        # 创建jq更新脚本
        echo '. as $current |' > "$WORK_DIR/update_version.jq"
        echo 'if $update_ipk then $current | .[$ipk_key] = $ipk_value else $current end |' >> "$WORK_DIR/update_version.jq"
        echo 'if $update_apk then . | .[$apk_key] = $apk_value else . end' >> "$WORK_DIR/update_version.jq"
        
        # 执行jq更新
        NEW_VERSION_DATA=$(jq -f "$WORK_DIR/update_version.jq" \
            --arg ipk_key "$IPK_ZIP_TARGET" \
            --arg ipk_value "${TAG_NAME},${RELEASE_DATE}" \
            --arg apk_key "$APK_ZIP_TARGET" \
            --arg apk_value "${TAG_NAME},${RELEASE_DATE}" \
            --argjson update_ipk "$IPK_NEED_UPDATE" \
            --argjson update_apk "$APK_NEED_UPDATE" \
            "$WORK_DIR/current_version.json")
        
        NEW_VERSION_CONTENT=$(echo "$NEW_VERSION_DATA" | jq -r .)
        echo "更新后的版本文件内容:"
        echo "$NEW_VERSION_CONTENT"

        # 上传版本文件
        echo "更新版本文件..."
        VERSION_JSON=$(curl -s -H "Authorization: token $TOKEN" \
                        "https://api.github.com/repos/$TARGET_REPO/contents/version.txt")
        
        SHA_VERSION=""
        if [ "$(echo "$VERSION_JSON" | jq -r '.message')" != "Not Found" ]; then
          SHA_VERSION=$(echo "$VERSION_JSON" | jq -r '.sha')
        fi

        VERSION_BASE64=$(echo -n "$NEW_VERSION_CONTENT" | base64 -w0)
        JSON_VERSION=$(jq -n \
            --arg msg "更新Passwall版本: $TAG_NAME" \
            --arg content "$VERSION_BASE64" \
            --arg sha "$SHA_VERSION" \
            '{message: $msg, content: $content, sha: $sha}')
        
        VERSION_RESPONSE=$(curl -s -X PUT \
                  -H "Authorization: token $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$JSON_VERSION" \
                  "https://api.github.com/repos/$TARGET_REPO/contents/version.txt")
        
        # 检查版本文件上传是否成功
        if echo "$VERSION_RESPONSE" | jq -e '.message' > /dev/null; then
          echo "错误: 版本文件上传失败 - $(echo "$VERSION_RESPONSE" | jq -r '.message')"
          exit 1
        fi

        # 上传ZIP文件的函数
        upload_file() {
          local file_path="$1"
          local target_path="$2"
          
          echo "上传文件到apk目录: $target_path..."
          CONTENT_JSON=$(curl -s -H "Authorization: token $TOKEN" \
                          "https://api.github.com/repos/$TARGET_REPO/contents/$target_path")
          
          local sha=""
          if [ "$(echo "$CONTENT_JSON" | jq -r '.message')" != "Not Found" ]; then
            sha=$(echo "$CONTENT_JSON" | jq -r '.sha')
          fi
          
          local content_base64=$(base64 -w0 "$file_path")
          local json_file="$WORK_DIR/upload_$(basename "$target_path").json"
          
          # 手动构建JSON
          echo -n '{"message": "' > "$json_file"
          echo -n "更新Passwall包: $target_path" >> "$json_file"
          echo -n '", "content": "' >> "$json_file"
          echo -n "$content_base64" >> "$json_file"
          echo -n '", "sha": "' >> "$json_file"
          echo -n "$sha" >> "$json_file"
          echo -n '"}' >> "$json_file"
          
          RESPONSE=$(curl -s -X PUT \
                -H "Authorization: token $TOKEN" \
                -H "Content-Type: application/json" \
                --data-binary "@$json_file" \
                "https://api.github.com/repos/$TARGET_REPO/contents/$target_path")
          
          local error_message=$(echo "$RESPONSE" | jq -r '.message')
          if [ "$error_message" != "null" ]; then
            echo "错误: $error_message"
            return 1
          fi
          return 0
        }

        # 上传 IPK 包
        if [ "$IPK_NEED_UPDATE" = true ]; then
          if upload_file "$WORK_DIR/$IPK_ZIP_TARGET" "$IPK_ZIP_PATH"; then
            echo "23.05-24.10 包上传成功到 apk 目录"
          else
            echo "上传 23.05-24.10 包失败"
            exit 1
          fi
        fi

        # 上传 APK 包
        if [ "$APK_NEED_UPDATE" = true ]; then
          if upload_file "$WORK_DIR/$APK_ZIP_TARGET" "$APK_ZIP_PATH"; then
            echo "25.12+ 包上传成功到 apk 目录"
          else
            echo "上传 25.12+ 包失败"
            exit 1
          fi
        fi

        echo "同步完成! 最新版本: $TAG_NAME"
        echo "23.05-24.10 更新状态: $IPK_NEED_UPDATE"
        echo "25.12+ 更新状态: $APK_NEED_UPDATE"

  cleanup_self:
    name: Cleanup Workflow History
    runs-on: ubuntu-latest
    needs: sync
    if: ${{ always() }}
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep_minimum_runs: 0
          retain_days: 0
          delete_workflow_pattern: "Passwall Packages Sync from Source Repository"
          repository: ${{ github.repository }}